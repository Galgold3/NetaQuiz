        const IconCheck = () => (
            <svg viewBox="0 0 100 100" className="w-24 h-24 mx-auto mb-4 drop-shadow-[0_0_20px_rgba(34,197,94,0.6)]">
                <circle cx="50" cy="50" r="45" fill="#22c55e" />
                <path fill="none" stroke="#ffffff" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round" d="M30 52l15 15 25-30" />
            </svg>
        );
        const IconCross = () => (
            <svg viewBox="0 0 100 100" className="w-24 h-24 mx-auto mb-4 drop-shadow-[0_0_20px_rgba(239,68,68,0.6)]">
                <circle cx="50" cy="50" r="45" fill="#ef4444" />
                <path fill="none" stroke="#ffffff" strokeWidth="8" strokeLinecap="round" d="M35 35l30 30M65 35L35 65" />
            </svg>
        );
        const IconMetro = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-20 h-20 text-blue-400 inline-block mb-4">
                <rect x="4" y="3" width="16" height="16" rx="2" ry="2" strokeLinecap="round" strokeLinejoin="round"></rect>
                <path d="M4 11h16" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M12 3v8" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M8 19l-2 3" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M16 19l2 3" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M8 15h.01" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M16 15h.01" strokeLinecap="round" strokeLinejoin="round"></path>
            </svg>
        );

        // --- TIMER COMPONENT ---
        const Timer = ({ timeLeft, maxTime = 30 }) => {
            const radius = 25;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (timeLeft / maxTime) * circumference;
            const isDanger = timeLeft <= 5;
            
            return (
                <div className="relative w-16 h-16 flex items-center justify-center mb-2">
                    <svg className="w-full h-full absolute top-0 left-0 timer-circle" viewBox="0 0 60 60">
                        <circle cx="30" cy="30" r={radius} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="5" />
                        <circle cx="30" cy="30" r={radius} fill="none" stroke={isDanger ? "#ef4444" : "#3b82f6"} strokeWidth="5" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" />
                    </svg>
                    <span className={`text-xl font-black ${isDanger ? 'text-red-400 animate-ping' : 'text-blue-300'}`}>{timeLeft}</span>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [playerName, setPlayerName] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminTab, setAdminTab] = useState('game'); 
            
            const [players, setPlayers] = useState([]);
            const [answers, setAnswers] = useState([]);
            const [dynamicQuestions, setDynamicQuestions] = useState(DEFAULT_QUESTIONS);
            
            const [gameState, setGameState] = useState({ step: 'login', questionIndex: 0, startedAt: null }); 

            const [selectedOption, setSelectedOption] = useState(null);
            const [timeLeft, setTimeLeft] = useState(30);

            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(u => { if (!u) auth.signInAnonymously(); setUser(u); });
                return unsubAuth;
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubQ = path.collection('config').doc('questions').onSnapshot(s => { 
                    if (s.exists) {
                        setDynamicQuestions(s.data().list); 
                    } else {
                        path.collection('config').doc('questions').set({ list: DEFAULT_QUESTIONS });
                    }
                });
                
                const unsubState = path.collection('config').doc('state').onSnapshot(s => { 
                    if (s.exists) {
                        setGameState(s.data()); 
                    } else {
                        const initialState = { step: 'lobby', questionIndex: 0, startedAt: null };
                        path.collection('config').doc('state').set(initialState);
                        setGameState(initialState);
                    }
                });
                
                const unsubP = path.collection('players').onSnapshot(s => setPlayers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubA = path.collection('answers').onSnapshot(s => setAnswers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                
                return () => { unsubQ(); unsubState(); unsubP(); unsubA(); };
            }, [user]);

            useEffect(() => {
                setSelectedOption(null);
            }, [gameState.questionIndex, gameState.step]);

            // Timer Logic
            useEffect(() => {
                let interval;
                if (gameState.step === 'question' && gameState.startedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - gameState.startedAt) / 1000);
                        const remaining = Math.max(0, 30 - elapsed);
                        setTimeLeft(remaining);
                        
                        if (remaining === 0 && isAdmin) {
                            clearInterval(interval);
                            updateGameState({ step: 'results' });
                        }
                    }, 1000);
                } else {
                    setTimeLeft(30);
                }
                return () => clearInterval(interval);
            }, [gameState.step, gameState.startedAt, isAdmin]);

            useEffect(() => {
                if (gameState.step === 'leaderboard') {
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#3b82f6', '#60a5fa', '#f59e0b', '#10b981'] });
                }
            }, [gameState.step]);

            const handleJoin = async () => {
                if (!playerName.trim()) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).set({name: playerName, score: 0});
            };

            const submitAnswer = async (optId) => {
                if (selectedOption !== null || gameState.step !== 'question' || timeLeft <= 0) return;
                
                setSelectedOption(optId);
                const q = dynamicQuestions[gameState.questionIndex];
                const isCorrect = q.options.find(o => o.id === optId)?.correct || false;

                if (isCorrect) {
                    const speedBonus = Math.floor((timeLeft / 30) * 50);
                    const points = 50 + speedBonus;
                    const p = players.find(p => p.id === user.uid);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).update({ score: (p?.score || 0) + points });
                }

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('answers').add({
                    playerId: user.uid, playerName, questionId: q.id, answerId: optId, isCorrect, timestamp: Date.now()
                });
            };

            const updateGameState = async (newState) => {
                const updatePayload = { ...newState };
                if (newState.step === 'question') {
                    updatePayload.startedAt = Date.now();
                }
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('state').set({...gameState, ...updatePayload}, { merge: true });
            };

            const resetGame = async () => {
                if (!confirm("האם אתה בטוח שברצונך לאפס את המשחק ולמחוק את כל הניקוד?")) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const pS = await path.collection('players').get();
                const aS = await path.collection('answers').get();
                const batch = db.batch();
                pS.forEach(d => batch.delete(d.ref));
                aS.forEach(d => batch.delete(d.ref));
                await batch.commit();
                await updateGameState({ step: 'lobby', questionIndex: 0, startedAt: null });
                alert("המשחק אופס בהצלחה.");
            };

            const saveAllQuestions = async () => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('questions').set({ list: dynamicQuestions });
                    alert("השאלות נשמרו בהצלחה במסד הנתונים! 💾");
                } catch (error) {
                    alert("אירעה שגיאה בשמירת השאלות.");
                }
            };

            const addQuestion = () => {
                const newQ = {
                    id: 'q_' + Date.now(),
                    question: "שאלה חדשה...",
                    options: [
                        { id: 'a', text: "תשובה 1", correct: true }, { id: 'b', text: "תשובה 2", correct: false },
                        { id: 'c', text: "תשובה 3", correct: false }, { id: 'd', text: "תשובה 4", correct: false }
                    ],
                    summary: "משפט מסכם לשאלה."
                };
                setDynamicQuestions([...dynamicQuestions, newQ]);
            };

            const deleteQuestion = (id) => {
                if(!confirm("למחוק שאלה זו? (יש ללחוץ על 'שמור שינויים' כדי לאשר סופית)")) return;
                setDynamicQuestions(dynamicQuestions.filter(q => q.id !== id));
            };

            const updateQuestionData = (qIdx, field, value) => {
                const n = [...dynamicQuestions];
                n[qIdx] = { ...n[qIdx], [field]: value };
                setDynamicQuestions(n);
            };

            const updateOptionText = (qIdx, oIdx, value) => {
                const n = [...dynamicQuestions];
                const updatedOptions = [...n[qIdx].options];
                updatedOptions[oIdx] = { ...updatedOptions[oIdx], text: value };
                n[qIdx] = { ...n[qIdx], options: updatedOptions };
                setDynamicQuestions(n);
            };

            const setCorrectOption = (qIdx, oIdx) => {
                const n = [...dynamicQuestions];
                const updatedOptions = n[qIdx].options.map((o, i) => ({ ...o, correct: i === oIdx }));
                n[qIdx] = { ...n[qIdx], options: updatedOptions };
                setDynamicQuestions(n);
            };

            const leaderboard = useMemo(() => [...players].sort((a,b) => (b.score||0)-(a.score||0)).slice(0, 5), [players]);
            const currentPlayer = players.find(p => p.id === user?.uid);
            const currentQ = dynamicQuestions[gameState.questionIndex];
            const currentAnswers = answers.filter(a => a.questionId === currentQ?.id);

            // ==========================================
            // PLAYER VIEWS
            // ==========================================
            if (!isAdmin) {
                if (!currentPlayer) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 w-full max-w-md mx-auto animate-slide">
                            <div className="text-center mb-8">
                                <IconMetro />
                                <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-l from-blue-400 to-indigo-400 drop-shadow-lg">ברוכים הבאים לחידון</h1>
                            </div>
                            <div className="glass-panel-light p-8 rounded-[2rem] w-full text-center shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
                                <h2 className="text-xl font-bold mb-6 text-blue-200">הכנס שם להצטרפות למשחק</h2>
                                <input type="text" className="w-full p-4 rounded-xl bg-slate-900/60 border border-blue-500/30 mb-6 text-center text-2xl font-black text-white outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500/50 transition-all" placeholder="איך קוראים לך?" value={playerName} onChange={e => setPlayerName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleJoin()} />
                                <button onClick={handleJoin} className="w-full bg-gradient-to-r from-blue-600 To-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-4 rounded-xl font-black text-xl transition-all shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:-translate-y-1">הצטרפות</button>
                            </div>
                            <button onClick={() => { const p = prompt("סיסמת מנהל:"); if(p === '12345') setIsAdmin(true); }} className="mt-12 text-slate-500 hover:text-blue-400 text-sm font-bold transition-all">⚙️ כניסת מנהל</button>
                        </div>
                    );
                }

                if (gameState.step === 'login' || gameState.step === 'lobby') {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 animate-slide text-center overflow-y-auto">
                            <div className="glass-panel-light p-10 rounded-[3rem] shadow-2xl max-w-md w-full border-t-4 border-t-blue-500">
                                <h2 className="text-4xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-br from-white to-blue-200">היי {currentPlayer.name}! 👋</h2>
                                <p className="text-2xl font-bold text-blue-300 mb-8 drop-shadow-md">עוד כמה רגעים מתחילים...</p>
                                <div className="flex justify-center space-x-3 space-x-reverse">
                                    <div className="w-4 h-4 bg-blue-500 rounded-full animate-bounce" style={{ animationDelay: '0s' }}></div>
                                    <div className="w-4 h-4 bg-indigo-500 rounded-full animate-bounce" style={{ animationDelay: '0.15s' }}></div>
                                    <div className="w-4 h-4 bg-purple-500 rounded-full animate-bounce" style={{ animationDelay: '0.3s' }}></div>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (gameState.step === 'question' && currentQ) {
                    const isTimeUp = timeLeft <= 0;
                    return (
                        <div className="flex flex-col items-center min-h-screen p-4 w-full max-w-2xl mx-auto pt-6 animate-slide overflow-y-auto">
                            <div className="w-full flex justify-between items-center mb-2">
                                <span className="bg-slate-800/80 px-4 py-1 rounded-full text-sm font-bold text-blue-300 border border-slate-700">שאלה {gameState.questionIndex + 1} / {dynamicQuestions.length}</span>
                                <span className="font-black text-lg bg-blue-900/50 px-4 py-1 rounded-full text-blue-200 border border-blue-700/50">⭐ {currentPlayer.score} נק'</span>
                            </div>
                            
                            <div className="flex justify-center w-full">
                                <Timer timeLeft={timeLeft} maxTime={30} />
                            </div>

                            <div className="glass-panel p-5 rounded-[2rem] w-full mb-4 shadow-2xl border-t-4 border-t-blue-500">
                                <h2 className="text-lg md:text-xl font-black leading-snug text-center">{currentQ.question}</h2>
                            </div>

                            <div className="grid grid-cols-1 gap-3 w-full pb-8">
                                {currentQ.options.map(opt => {
                                    const isSelected = selectedOption === opt.id;
                                    
                                    let btnClasses = "p-4 md:p-5 rounded-2xl border-2 transition-all w-full relative ";
                                    if (isSelected) {
                                        btnClasses += "bg-blue-600 border-blue-400 shadow-[0_0_20px_rgba(59,130,246,0.5)] opacity-100";
                                    } else if (selectedOption !== null || isTimeUp) {
                                        btnClasses += "opacity-40 bg-slate-800/40 border-slate-800 cursor-not-allowed";
                                    } else {
                                        btnClasses += "bg-slate-800/60 border-slate-600 hover:border-blue-400 hover:bg-slate-700 opacity-100";
                                    }

                                    return (
                                        <button 
                                            key={opt.id} 
                                            onClick={() => submitAnswer(opt.id)}
                                            disabled={selectedOption !== null || isTimeUp}
                                            className={btnClasses}
                                        >
                                            <div className="flex items-center justify-between w-full h-full pointer-events-none gap-3">
                                                <span className="flex-1 text-right text-sm md:text-base font-bold leading-snug break-words whitespace-normal">{opt.text}</span>
                                                <div className={`w-5 h-5 md:w-6 md:h-6 rounded-full shrink-0 transition-all duration-300 ${isSelected ? 'bg-blue-300 border-blue-300 shadow-[0_0_15px_rgba(147,197,253,0.9)]' : 'border-2 border-slate-500/50'}`}></div>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                            
                            {selectedOption !== null && (
                                <div className="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-sm text-blue-300 font-bold animate-pulse text-center bg-blue-900/90 px-6 py-3 rounded-full border border-blue-500/50 backdrop-blur">
                                    התשובה נקלטה! ממתינים לכולם...
                                </div>
                            )}
                        </div>
                    );
                }

                if (gameState.step === 'results' && currentQ) {
                    const myAnswerDoc = answers.find(a => a.playerId === user.uid && a.questionId === currentQ.id);
                    const isCorrect = myAnswerDoc?.isCorrect;
                    const correctOpt = currentQ.options.find(o => o.correct);

                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 animate-pop text-center overflow-y-auto">
                            <div className={`glass-panel p-10 rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] w-full max-w-md border-2 relative overflow-hidden ${isCorrect ? 'border-green-500 bg-gradient-to-b from-green-900/40 to-slate-900/80' : 'border-red-500 bg-gradient-to-b from-red-900/40 to-slate-900/80'}`}>
                                
                                {isCorrect ? <IconCheck /> : <IconCross />}
                                
                                <h2 className={`text-4xl md:text-5xl font-black mb-4 drop-shadow-lg ${isCorrect ? 'text-green-400' : 'text-red-400'}`}>
                                    {isCorrect ? "נכון מאוד!" : "טעות..."}
                                </h2>
                                
                                {!isCorrect && correctOpt && (
                                    <div className="mt-6 bg-slate-900/80 p-5 rounded-2xl border border-slate-700 text-right shadow-inner">
                                        <p className="text-xs md:text-sm text-red-300 font-bold mb-2 uppercase tracking-wide">התשובה הנכונה:</p>
                                        <p className="font-bold text-white text-base md:text-lg">{correctOpt.text}</p>
                                    </div>
                                )}
                                
                                <div className="mt-8 pt-6 border-t border-white/10">
                                    <p className="text-xs md:text-sm text-slate-400 mb-1 font-bold uppercase tracking-wider">סך הכל ניקוד</p>
                                    <p className="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300">{currentPlayer.score}</p>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (gameState.step === 'leaderboard') {
                    const myRank = [...players].sort((a,b) => (b.score||0)-(a.score||0)).findIndex(p => p.id === user.uid) + 1;
                    const isLastQuestion = gameState.questionIndex >= dynamicQuestions.length - 1;

                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 animate-slide text-center overflow-y-auto">
                            <div className="glass-panel p-10 rounded-[3rem] shadow-[0_0_50px_rgba(234,179,8,0.2)] max-w-md w-full border-2 border-yellow-500/50 bg-gradient-to-b from-yellow-900/20 to-slate-900">
                                <div className="text-6xl md:text-7xl mb-6 drop-shadow-2xl">🏆</div>
                                <h2 className="text-2xl md:text-3xl font-black mb-4 text-white">הבט במסך המרכזי!</h2>
                                <p className="text-lg md:text-xl text-slate-300 mb-6">המיקום שלך כרגע: <strong className="text-yellow-400 text-3xl md:text-4xl block mt-2 drop-shadow-md">#{myRank}</strong></p>
                                
                                {isLastQuestion ? (
                                    <div className="text-sm md:text-md text-green-300 font-black bg-green-900/40 p-4 rounded-xl border border-green-500/30">
                                        כל הכבוד! סיום המשחק 🎉
                                    </div>
                                ) : (
                                    <div className="text-sm md:text-md text-blue-200 font-bold bg-blue-900/40 p-4 rounded-xl border border-blue-500/30 animate-pulse">
                                        הכן את עצמך לשאלה הבאה...
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                return null;
            }

            // ==========================================
            // ADMIN VIEW (FULLSCREEN PRESENTATION)
            // ==========================================
            if (adminTab === 'game') {
                return (
                    <div className="fixed inset-0 z-50 bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex flex-col items-center overflow-hidden pb-24">
                        
                        <div className="w-full h-full max-w-6xl px-4 md:px-8 flex flex-col justify-between relative pt-4 pb-6 mx-auto">
                            
                            {gameState.step === 'lobby' && (
                                <div className="text-center animate-slide h-full flex flex-col items-center justify-center">
                                    <IconMetro />
                                    <h1 className="text-5xl md:text-7xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-b from-white to-blue-300 drop-shadow-2xl">ברוכים הבאים לחידון!</h1>
                                    <div className="text-2xl md:text-3xl font-bold text-blue-300 mb-10 bg-blue-900/30 inline-block px-8 py-3 rounded-full border border-blue-500/30 shadow-lg">ממתינים לשחקנים... ({players.length})</div>
                                    <div className="flex flex-wrap gap-3 justify-center max-w-4xl mx-auto w-full px-2">
                                        {players.map(p => <span key={p.id} className="bg-slate-800/80 backdrop-blur px-5 py-2 rounded-full font-black text-lg md:text-xl border-2 border-slate-600 shadow-xl">{p.name}</span>)}
                                    </div>
                                </div>
                            )}

                            {gameState.step === 'question' && currentQ && (
                                <div className="flex flex-col h-full w-full animate-slide justify-center flex-1">
                                    <div className="flex justify-between items-center mb-4 shrink-0">
                                        <span className="text-blue-400 font-black text-xl md:text-2xl bg-blue-900/30 px-5 py-2 rounded-2xl border border-blue-500/30">שאלה {gameState.questionIndex + 1}</span>
                                        <Timer timeLeft={timeLeft} maxTime={30} />
                                        <span className="text-slate-400 font-bold text-lg md:text-xl bg-slate-800/50 px-5 py-2 rounded-2xl border border-slate-600">ענו: <strong className="text-white">{currentAnswers.length} / {players.length}</strong></span>
                                    </div>
                                    <div className="flex-1 flex flex-col justify-center min-h-0">
                                        <h2 className="text-3xl md:text-4xl lg:text-5xl font-black mb-6 leading-tight text-center drop-shadow-xl shrink-0">{currentQ.question}</h2>
                                        <div className="grid grid-cols-2 gap-4 w-full shrink-0">
                                            {currentQ.options.map((opt, i) => (
                                                <div key={opt.id} className="bg-slate-800/60 backdrop-blur-md p-4 md:p-6 rounded-2xl md:rounded-3xl border-2 border-slate-600 text-lg md:text-xl lg:text-2xl leading-snug font-bold text-center flex items-center justify-center min-h-[90px] shadow-2xl">
                                                    {opt.text}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {gameState.step === 'results' && currentQ && (
                                <div className="flex flex-col w-full h-full animate-slide justify-between">
                                    <h2 className="text-2xl md:text-3xl font-black mb-2 text-center text-blue-300 uppercase tracking-widest shrink-0">תוצאות השאלה</h2>
                                    
                                    <div className="space-y-2 md:space-y-3 flex-1 flex flex-col justify-center max-w-5xl mx-auto w-full min-h-0">
                                        {currentQ.options.map(opt => {
                                            const count = currentAnswers.filter(a => a.answerId === opt.id).length;
                                            const pct = currentAnswers.length ? Math.round((count / currentAnswers.length) * 100) : 0;
                                            return (
                                                <div key={opt.id} className="w-full grid grid-cols-[48px_1fr_48px] items-center gap-4 min-h-0">
                                                    
                                                    <div className="w-12 h-12 shrink-0 flex items-center justify-center">
                                                        {opt.correct && (
                                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" className="w-12 h-12 text-green-400 drop-shadow-[0_0_12px_rgba(74,222,128,0.9)] animate-pop">
                                                                <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                                            </svg>
                                                        )}
                                                    </div>
                                                    
                                                    <div className={`flex-1 relative overflow-hidden rounded-xl md:rounded-2xl border-2 p-2.5 md:p-3.5 flex justify-between items-center z-10 shadow-xl min-h-0 ${opt.correct ? 'border-green-500 bg-green-900/40' : 'border-slate-700 bg-slate-800/60'}`}>
                                                        <div className="absolute top-0 right-0 h-full bg-gradient-to-l from-blue-600/30 to-indigo-600/30 -z-10 transition-all duration-1000" style={{ width: `${pct}%` }}></div>
                                                        <span className={`font-black text-base md:text-lg lg:text-xl leading-snug z-20 text-right pl-4 ${opt.correct ? 'text-green-300 drop-shadow-md' : 'text-slate-200'}`}>
                                                            {opt.text}
                                                        </span>
                                                        <span className="font-black text-xl md:text-2xl z-20 text-white drop-shadow-md shrink-0">{count} <span className="text-sm md:text-base text-slate-300">({pct}%)</span></span>
                                                    </div>

                                                    <div className="w-12 h-12 shrink-0"></div>

                                                </div>
                                            );
                                        })}
                                    </div>

                                    <div className="mt-3 shrink-0 bg-gradient-to-r from-blue-600/90 to-indigo-600/90 p-4 md:p-5 rounded-3xl border-2 border-blue-400 shadow-[0_0_30px_rgba(59,130,246,0.6)] backdrop-blur-xl flex flex-col md:flex-row items-center justify-between gap-6 w-full max-w-5xl mx-auto">
                                        <div className="flex-1 text-right">
                                            <p className="text-blue-100 font-bold text-sm md:text-base mb-1 uppercase tracking-widest drop-shadow">משפט מסכם:</p>
                                            <p className="text-2xl md:text-3xl lg:text-4xl font-black text-white leading-tight drop-shadow-lg">{currentQ.summary}</p>
                                        </div>
                                        {currentQ.image && (
                                            <img src={currentQ.image} alt="Traffic Illustration" className="w-1/4 max-w-[260px] h-24 md:h-32 object-cover rounded-xl border border-white/20 shadow-2xl animate-pop shrink-0" />
                                        )}
                                    </div>
                                </div>
                            )}

                            {gameState.step === 'leaderboard' && (
                                <div className="flex flex-col items-center justify-center h-full animate-slide w-full">
                                    <h2 className="text-5xl md:text-6xl font-black mb-10 text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-yellow-500 drop-shadow-[0_5px_15px_rgba(234,179,8,0.4)] shrink-0">🏆 המובילים 🏆</h2>
                                    <div className="w-full max-w-2xl space-y-4 flex-1 flex flex-col justify-center">
                                        {leaderboard.map((p, i) => (
                                            <div key={p.id} className={`flex justify-between items-center p-4 md:p-5 rounded-2xl md:rounded-3xl font-black text-2xl md:text-3xl shadow-2xl ${i === 0 ? 'bg-gradient-to-r from-yellow-600/40 to-yellow-500/20 border-2 border-yellow-400 text-yellow-300 scale-105 shadow-[0_0_20px_rgba(234,179,8,0.4)] mb-4' : 'bg-slate-800/80 border border-slate-600 text-white'}`}>
                                                <span>{i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)+'.'} {p.name}</span>
                                                <span className="font-bold">{p.score} <span className="text-lg md:text-xl opacity-70">נק'</span></span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* FLOATING ADMIN CONTROLS (BOTTOM CENTER) */}
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.8)] flex items-center gap-4 z-50 border-t border-white/20 whitespace-nowrap">
                            <span className="text-slate-400 font-bold text-xs md:text-sm tracking-widest uppercase flex items-center gap-2 hidden md:flex">
                                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                בקרת מנהל
                            </span>
                            <div className="h-6 w-px bg-slate-700 hidden md:block"></div>

                            {gameState.step === 'lobby' && (
                                <button onClick={() => updateGameState({ step: 'question', questionIndex: 0 })} className="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white px-6 py-2 rounded-full font-black text-base md:text-lg shadow-lg hover:shadow-green-500/50 transition-all hover:-translate-y-1">🚀 התחל משחק</button>
                            )}
                            
                            {gameState.step === 'question' && (
                                <button onClick={() => updateGameState({ step: 'results' })} className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-6 py-2 rounded-full font-black text-base md:text-lg shadow-lg hover:shadow-blue-500/50 transition-all hover:-translate-y-1">📊 חשוף תוצאות</button>
                            )}

                            {gameState.step === 'results' && (
                                <button onClick={() => updateGameState({ step: 'leaderboard' })} className="bg-gradient-to-r from-yellow-600 to-orange-500 hover:from-yellow-500 hover:to-orange-400 text-white px-6 py-2 rounded-full font-black text-base md:text-lg shadow-lg hover:shadow-yellow-500/50 transition-all hover:-translate-y-1">🏆 טבלת מובילים</button>
                            )}

                            {gameState.step === 'leaderboard' && (
                                gameState.questionIndex < dynamicQuestions.length - 1 ? (
                                    <button onClick={() => updateGameState({ step: 'question', questionIndex: gameState.questionIndex + 1 })} className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-6 py-2 rounded-full font-black text-base md:text-lg shadow-lg transition-all hover:-translate-y-1">➔ לשאלה הבאה</button>
                                ) : (
                                    <span className="text-green-400 font-black px-4 text-sm md:text-base">סיום המשחק! 🎉</span>
                                )
                            )}
                            
                            <div className="h-6 w-px bg-slate-700"></div>
                            <button onClick={() => setAdminTab('questions')} className="text-slate-300 hover:text-white font-bold bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-full transition-all text-sm md:text-base">⚙️ עריכת שאלות</button>
                        </div>
                    </div>
                );
            }

            // --- ADMIN: QUESTIONS EDITOR ---
            return (
                <div className="min-h-screen flex flex-col items-center p-4 w-full overflow-y-auto">
                    <nav className="w-full max-w-5xl flex flex-wrap justify-between items-center glass-panel-light p-4 rounded-2xl shadow-lg mb-6 sticky top-4 z-50 shrink-0">
                        <div className="font-black text-xl md:text-2xl text-blue-300 flex items-center gap-3">
                            ⚙️ פאנל ניהול
                            <span className="text-xs md:text-sm bg-blue-900/50 text-blue-200 px-3 py-1 rounded-full border border-blue-700 font-normal shadow-inner hidden md:inline">
                                מצב עריכה
                            </span>
                        </div>
                        <div className="flex gap-2 md:gap-3">
                            <button onClick={() => setAdminTab('game')} className="px-4 md:px-6 py-2 rounded-xl font-bold transition-all bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg hover:shadow-blue-500/50 text-sm md:text-base">חזור למשחק ➔</button>
                            <button onClick={() => setIsAdmin(false)} className="px-4 py-2 rounded-xl font-bold bg-red-900/40 text-red-300 hover:bg-red-800/80 border border-red-800 transition-all text-sm md:text-base">יציאה</button>
                        </div>
                    </nav>

                    <main className="w-full max-w-5xl pb-10 animate-slide">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-slate-800/50 p-5 rounded-3xl border border-slate-700 shadow-xl gap-4">
                            <div className="flex flex-wrap gap-3 w-full md:w-auto">
                                <button onClick={saveAllQuestions} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-black shadow-[0_0_15px_rgba(59,130,246,0.5)] transition-all flex-1 md:flex-none text-sm md:text-base border-2 border-blue-400">💾 שמור שינויים</button>
                                <button onClick={addQuestion} className="bg-green-600 hover:bg-green-500 text-white px-5 py-2.5 rounded-xl font-black shadow-lg transition-all flex-1 md:flex-none text-sm md:text-base">➕ הוסף שאלה</button>
                                <button onClick={resetGame} className="bg-red-900/80 hover:bg-red-700 text-red-100 px-5 py-2.5 rounded-xl font-bold shadow-lg border border-red-600 transition-all flex-1 md:flex-none text-sm md:text-base">🗑️ איפוס משחק</button>
                            </div>
                            <h2 className="text-xl font-black text-slate-300">שאלות: {dynamicQuestions.length}</h2>
                        </div>
                        
                        <div className="space-y-6">
                            {dynamicQuestions.map((q, qIdx) => (
                                <div key={q.id} className="glass-panel p-6 md:p-8 rounded-[2.5rem] shadow-2xl relative border-t-4 border-t-slate-600 transition-all hover:border-t-blue-500">
                                    <button onClick={() => deleteQuestion(q.id)} className="absolute top-4 left-4 md:top-6 md:left-6 text-red-400 hover:text-white bg-red-900/30 hover:bg-red-600 px-3 py-1.5 md:px-4 md:py-2 rounded-xl font-bold transition-all border border-red-800 text-xs md:text-sm">מחק 🗑️</button>
                                    
                                    <div className="mb-5 pr-2 mt-4 md:mt-0">
                                        <label className="block text-xs md:text-sm font-black text-blue-400 mb-2 uppercase tracking-widest">שאלה {qIdx + 1}</label>
                                        <input type="text" className="w-full p-4 bg-slate-900/80 border-2 border-slate-700 rounded-2xl font-black text-xl md:text-2xl text-white outline-none focus:border-blue-500 transition-colors shadow-inner" value={q.question} onChange={e => updateQuestionData(qIdx, 'question', e.target.value)} />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-900/40 p-4 md:p-5 rounded-3xl border border-slate-700/50 mb-5">
                                        {q.options.map((opt, oIdx) => (
                                            <div key={opt.id} className={`flex items-center gap-3 p-3 rounded-2xl border-2 transition-all ${opt.correct ? 'bg-green-900/20 border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.2)]' : 'bg-slate-800 border-slate-700 hover:border-slate-500'}`}>
                                                <input type="radio" name={`correct_${q.id}`} checked={opt.correct} onChange={() => setCorrectOption(qIdx, oIdx)} className="w-5 h-5 cursor-pointer accent-green-500" />
                                                <input type="text" className="flex-1 bg-transparent border-none outline-none font-bold text-base md:text-lg text-white placeholder-slate-500" value={opt.text} placeholder={`תשובה ${oIdx+1}`} onChange={e => updateOptionText(qIdx, oIdx, e.target.value)} />
                                            </div>
                                        ))}
                                    </div>

                                    <div>
                                        <label className="block text-xs md:text-sm font-black text-indigo-400 mb-2 uppercase tracking-widest">משפט מסכם (לאחר התוצאות)</label>
                                        <input type="text" className="w-full p-4 bg-indigo-950/30 border border-indigo-900/50 rounded-2xl text-white font-bold text-base md:text-lg outline-none focus:border-indigo-400 transition-colors" value={q.summary} onChange={e => updateQuestionData(qIdx, 'summary', e.target.value)} />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ברוכים הבאים לחידון הפתיחה של קורס הנדסת תנועה ותחבורה</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { font-family: 'Heebo', sans-serif; margin: 0; direction: rtl; background-color: #0f172a; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-panel-light { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .animate-slide { animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes slide-up { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-pop { animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes pop { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .timer-circle {
            transition: stroke-dashoffset 1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        
        /* Custom Scrollbar for admin panel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 text-white min-h-screen selection:bg-blue-500 selection:text-white">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCKM8oe0LNgk8FGZ2vj0rhEV9rCkKRkDGE",
            authDomain: "netaquiz.firebaseapp.com",
            projectId: "netaquiz",
            storageBucket: "netaquiz.firebasestorage.app",
            messagingSenderId: "1014660940306",
            appId: "1:1014660940306:web:62efbbbfc70baf25570ecb",
            measurementId: "G-R91ZT5ZEN5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // הגדרת חדר v5 נקי כדי למנוע קריסה מול נתוני עבר מסונכרנים
        const appId = 'nta-traffic-quiz-v5';

        const DEFAULT_QUESTIONS = [
            { 
                id: 'q1', 
                question: "מה קרה בשנת 1922 בתל אביב, כשהיו בעיר רק מכוניות בודדות ומעט חמורים?", 
                options: [
                    { id: 'a', text: "א. נרשמה התנגשות המכוניות הראשונה בהיסטוריה של העיר (ברחוב הרצל)", correct: true },
                    { id: 'b', text: "ב. הוכרז ה\"נת\"צ\" הראשון בעולם לעגלות עם סוסים", correct: false },
                    { id: 'c', text: "ג. נפתח קורס הנדסת התנועה הראשון על ידי מאיר דיזנגוף", correct: false },
                    { id: 'd', text: "ד. הנהג היחיד בעיר קיבל דו\"ח על מהירות מופרזת של 12 קמ\"ש", correct: false }
                ],
                summary: "בעיות תנועה וקונפליקטים בצמתים נוצרים גם כשיש מעט מאוד כלי רכב – הכל עניין של ניהול המרחב."
            }
        ];

        // --- ICONS ---
        const IconCheck = () => (
            <svg viewBox="0 0 100 100" className="w-24 h-24 mx-auto mb-4 drop-shadow-[0_0_20px_rgba(34,197,94,0.6)]">
                <circle cx="50" cy="50" r="45" fill="#22c55e" />
                <path fill="none" stroke="#ffffff" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round" d="M30 52l15 15 25-30" />
            </svg>
        );
        const IconCross = () => (
            <svg viewBox="0 0 100 100" className="w-24 h-24 mx-auto mb-4 drop-shadow-[0_0_20px_rgba(239,68,68,0.6)]">
                <circle cx="50" cy="50" r="45" fill="#ef4444" />
                <path fill="none" stroke="#ffffff" strokeWidth="8" strokeLinecap="round" d="M35 35l30 30M65 35L35 65" />
            </svg>
        );
        const IconMetro = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-20 h-20 text-blue-400 inline-block mb-4">
                <rect x="4" y="3" width="16" height="16" rx="2" ry="2" strokeLinecap="round" strokeLinejoin="round"></rect>
                <path d="M4 11h16" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M12 3v8" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M8 19l-2 3" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M16 19l2 3" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M8 15h.01" strokeLinecap="round" strokeLinejoin="round"></path>
                <path d="M16 15h.01" strokeLinecap="round" strokeLinejoin="round"></path>
            </svg>
        );

        // --- TIMER COMPONENT ---
        const Timer = ({ timeLeft, maxTime = 30 }) => {
            const radius = 25;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (timeLeft / maxTime) * circumference;
            const isDanger = timeLeft <= 5;
            
            return (
                <div className="relative w-16 h-16 flex items-center justify-center mb-2">
                    <svg className="w-full h-full absolute top-0 left-0 timer-circle" viewBox="0 0 60 60">
                        <circle cx="30" cy="30" r={radius} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="5" />
                        <circle cx="30" cy="30" r={radius} fill="none" stroke={isDanger ? "#ef4444" : "#3b82f6"} strokeWidth="5" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" />
                    </svg>
                    <span className={`text-xl font-black ${isDanger ? 'text-red-400 animate-ping' : 'text-blue-300'}`}>{timeLeft}</span>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [playerName, setPlayerName] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminTab, setAdminTab] = useState('game'); 
            
            const [players, setPlayers] = useState([]);
            const [answers, setAnswers] = useState([]);
            const [dynamicQuestions, setDynamicQuestions] = useState(DEFAULT_QUESTIONS);
            
            const [gameState, setGameState] = useState({ step: 'login', questionIndex: 0, startedAt: null }); 

            const [selectedOption, setSelectedOption] = useState(null);
            const [timeLeft, setTimeLeft] = useState(30);

            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(u => { if (!u) auth.signInAnonymously(); setUser(u); });
                return unsubAuth;
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubQ = path.collection('config').doc('questions').onSnapshot(s => { 
                    if (s.exists) {
                        setDynamicQuestions(s.data().list); 
                    } else {
                        path.collection('config').doc('questions').set({ list: DEFAULT_QUESTIONS });
                    }
                });
                
                const unsubState = path.collection('config').doc('state').onSnapshot(s => { 
                    if (s.exists) {
                        setGameState(s.data()); 
                    } else {
                        const initialState = { step: 'lobby', questionIndex: 0, startedAt: null };
                        path.collection('config').doc('state').set(initialState);
                        setGameState(initialState);
                    }
                });
                
                const unsubP = path.collection('players').onSnapshot(s => setPlayers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubA = path.collection('answers').onSnapshot(s => setAnswers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                
                return () => { unsubQ(); unsubState(); unsubP(); unsubA(); };
            }, [user]);

            useEffect(() => {
                setSelectedOption(null);
            }, [gameState.questionIndex, gameState.step]);

            // Timer Logic
            useEffect(() => {
                let interval;
                if (gameState.step === 'question' && gameState.startedAt) {
                    interval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - gameState.startedAt) / 1000);
                        const remaining = Math.max(0, 30 - elapsed);
                        setTimeLeft(remaining);
                        
                        if (remaining === 0 && isAdmin) {
                            clearInterval(interval);
                            updateGameState({ step: 'results' });
                        }
                    }, 1000);
                } else {
                    setTimeLeft(30);
                }
                return () => clearInterval(interval);
            }, [gameState.step, gameState.startedAt, isAdmin]);

            useEffect(() => {
                if (gameState.step === 'leaderboard') {
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#3b82f6', '#60a5fa', '#f59e0b', '#10b981'] });
                }
            }, [gameState.step]);

            const handleJoin = async () => {
                if (!playerName.trim()) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).set({name: playerName, score: 0});
            };

            const submitAnswer = async (optId) => {
                if (selectedOption !== null || gameState.step !== 'question' || timeLeft <= 0) return;
                
                setSelectedOption(optId);
                const q = dynamicQuestions[gameState.questionIndex];
                const isCorrect = q?.options?.find(o => o.id === optId)?.correct || false;

                if (isCorrect) {
                    const speedBonus = Math.floor((timeLeft / 30) * 50);
                    const points = 50 + speedBonus;
                    const p = players.find(p => p.id === user.uid);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).update({ score: (p?.score || 0) + points });
                }

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('answers').add({
                    playerId: user.uid, playerName, questionId: q?.id || 'unknown', answerId: optId, isCorrect, timestamp: Date.now()
                });
            };

            const updateGameState = async (newState) => {
                const updatePayload = { ...newState };
                if (newState.step === 'question') {
                    updatePayload.startedAt = Date.now();
                }
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('state').set({...gameState, ...updatePayload}, { merge: true });
            };

            const resetGame = async () => {
                if (!confirm("האם אתה בטוח שברצונך לאפס את המשחק ולמחוק את כל הניקוד?")) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const pS = await path.collection('players').get();
                const aS = await path.collection('answers').get();
                const batch = db.batch();
                pS.forEach(d => batch.delete(d.ref));
                aS.forEach(d => batch.delete(d.ref));
                await batch.commit();
                await updateGameState({ step: 'lobby', questionIndex: 0, startedAt: null });
                alert("המשחק אופס בהצלחה.");
            };

            const saveAllQuestions = async () => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('questions').set({ list: dynamicQuestions });
                    alert("השאלות נשמרו בהצלחה במסד הנתונים! 💾");
                } catch (error) {
                    alert("אירעה שגיאה בשמירת השאלות.");
                }
            };

            const addQuestion = () => {
                const newQ = {
                    id: 'q_' + Date.now(),
                    question: "שאלה חדשה...",
                    options: [
                        { id: 'a', text: "תשובה 1", correct: true }, { id: 'b', text: "תשובה 2", correct: false },
                        { id: 'c', text: "תשובה 3", correct: false }, { id: 'd', text: "תשובה 4", correct: false }
                    ],
                    summary: "לסיכום:"
                };
                setDynamicQuestions([...dynamicQuestions, newQ]);
            };

            const deleteQuestion = (id) => {
                if(!confirm("למחוק שאלה זו? (יש ללחוץ על 'שמור שינויים' כדי לאשר סופית)")) return;
                setDynamicQuestions(dynamicQuestions.filter(q => q.id !== id));
            };

            const updateQuestionData = (qIdx, field, value) => {
                const n = [...dynamicQuestions];
                n[qIdx] = { ...n[qIdx], [field]: value };
                setDynamicQuestions(n);
            };

            const updateOptionText = (qIdx, oIdx, value) => {
                const n = [...dynamicQuestions];
                const updatedOptions = [...n[qIdx].options];
                updatedOptions[oIdx] = { ...updatedOptions[oIdx], text: value };
                n[qIdx] = { ...n[qIdx], options: updatedOptions };
                setDynamicQuestions(n);
            };

            const setCorrectOption = (qIdx, oIdx) => {
                const n = [...dynamicQuestions];
                const updatedOptions = n[qIdx].options.map((o, i) => ({ ...o, correct: i === oIdx }));
                n[qIdx] = { ...n[qIdx], options: updatedOptions };
                setDynamicQuestions(n);
            };

            const leaderboard = useMemo(() => [...players].sort((a,b) => (b.score||0)-(a.score||0)).slice(0, 5), [players]);
            const currentPlayer = players.find(p => p.id === user?.uid);
            const currentQ = dynamicQuestions[gameState.questionIndex];
            const currentAnswers = answers.filter(a => a.questionId === currentQ?.id);

            // ==========================================
            // PLAYER VIEWS
            // ==========================================
            if (!isAdmin) {
                if (!currentPlayer) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 w-full max-w-md mx-auto animate-slide">
                            <div className="text-center mb-8">
                                <IconMetro />
                                <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-l from-blue-400 to-indigo-400 drop-shadow-lg leading-tight px-4">ברוכים הבאים לחידון הפתיחה של קורס הנדסת תנועה ותחבורה</h1>
                            </div>
                            <div className="glass-panel-light p-8 rounded-[2rem] w-full text-center shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
                                <h2 className="text-xl font-bold mb-6 text-blue-200">הכנס שם להצטרפות למשחק</h2>
                                <input type="text" className="w-full p-4 rounded-xl bg-slate-900/60 border border-blue-500/30 mb-6 text-center text-2xl font-black text-white outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500/50 transition-all" placeholder="איך קוראים לך?" value={playerName} onChange={e => setPlayerName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleJoin()} />
                                <button onClick={handleJoin} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-4 rounded-xl font-black text-xl transition-all shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:-translate-y-1">הצטרפות</button>
                            </div>
                            <button onClick={() => { const p = prompt("סיסמת מנהל:"); if(p === '12345') setIsAdmin(true); }} className="mt-12 text-slate-500 hover:text-blue-400 text-sm font-bold transition-all">⚙️ כניסת מנהל</button>
                        </div>
                    );
                }

                if (gameState.step === 'login' || gameState.step === 'lobby') {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                            <div className="glass-panel-light p-10 rounded-[3rem] shadow-2xl max-w-md w-full">
                                <h2 className="text-4xl font-black mb-4">היי {currentPlayer.name}! 👋</h2>
                                <p className="text-2xl font-bold text-blue-300">עוד כמה רגעים מתחילים...</p>
                            </div>
                        </div>
                    );
                }

                if (gameState.step === 'question' && currentQ) {
                    const isTimeUp = timeLeft <= 0;
                    return (
                        <div className="flex flex-col items-center min-h-screen p-4 w-full max-w-2xl mx-auto pt-6 animate-slide overflow-y-auto">
                            <div className="w-full flex justify-between items-center mb-2">
                                <span className="bg-slate-800/80 px-4 py-1 rounded-full text-sm font-bold text-blue-300 border border-slate-700">שאלה {gameState.questionIndex + 1} / {dynamicQuestions.length}</span>
                                <span className="font-black text-lg bg-blue-900/50 px-4 py-1 rounded-full text-blue-200 border border-blue-700/50">⭐ {currentPlayer.score} נק'</span>
                            </div>
                            
                            <div className="flex justify-center w-full">
                                <Timer timeLeft={timeLeft} maxTime={30} />
                            </div>

                            <div className="glass-panel p-5 rounded-[2rem] w-full mb-4 shadow-2xl border-t-4 border-t-blue-500">
                                <h2 className="text-lg md:text-xl font-black leading-snug text-center">{currentQ.question}</h2>
                            </div>

                            <div className="grid grid-cols-1 gap-3 w-full pb-8">
                                {currentQ.options && currentQ.options.map(opt => {
                                    const isSelected = selectedOption === opt.id;
                                    
                                    let btnClasses = "p-4 md:p-5 rounded-2xl border-2 transition-all w-full relative ";
                                    if (isSelected) {
                                        btnClasses += "bg-blue-600 border-blue-400 shadow-[0_0_20px_rgba(59,130,246,0.5)] opacity-100";
                                    } else if (selectedOption !== null || isTimeUp) {
                                        btnClasses += "opacity-40 bg-slate-800/40 border-slate-800 cursor-not-allowed";
                                    } else {
                                        btnClasses += "bg-slate-800/60 border-slate-600 hover:border-blue-400 hover:bg-slate-700 opacity-100";
                                    }

                                    return (
                                        <button 
                                            key={opt.id} 
                                            onClick={() => submitAnswer(opt.id)}
                                            disabled={selectedOption !== null || isTimeUp}
                                            className={btnClasses}
                                        >
                                            <div className="flex items-center justify-between w-full h-full pointer-events-none gap-3">
                                                <span className="flex-1 text-right text-sm md:text-base font-bold leading-snug break-words whitespace-normal">{opt.text}</span>
                                                <div className={`w-5 h-5 md:w-6 md:h-6 rounded-full shrink-0 transition-all duration-300 ${isSelected ? 'bg-blue-300 border-blue-300 shadow-[0_0_15px_rgba(147,197,253,0.9)]' : 'border-2 border-slate-500/50'}`}></div>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    );
                }

                if (gameState.step === 'results' && currentQ) {
                    const myAnswerDoc = answers.find(a => a.playerId === user.uid && a.questionId === currentQ.id);
                    const isCorrect = myAnswerDoc?.isCorrect;
                    const correctOpt = currentQ.options && currentQ.options.find(o => o.correct);

                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                            <div className={`glass-panel p-10 rounded-[3rem] w-full max-w-md border-2 relative overflow-hidden ${isCorrect ? 'border-green-500' : 'border-red-500'}`}>
                                {isCorrect ? <IconCheck /> : <IconCross />}
                                <h2 className={`text-4xl font-black mb-4 ${isCorrect ? 'text-green-400' : 'text-red-400'}`}>{isCorrect ? "נכון מאוד!" : "טעות..."}</h2>
                                {!isCorrect && correctOpt && (
                                    <div className="mt-6 bg-slate-900/80 p-5 rounded-2xl text-right border border-slate-700">
                                        <p className="text-xs text-red-300 font-bold mb-2 uppercase">התשובה הנכונה:</p>
                                        <p className="font-bold text-white text-sm md:text-base">{correctOpt.text}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                if (gameState.step === 'leaderboard') {
                    const myRank = [...players].sort((a,b) => (b.score||0)-(a.score||0)).findIndex(p => p.id === user.uid) + 1;
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                            <div className="glass-panel p-10 rounded-[3rem] max-w-md w-full border-2 border-yellow-500/50">
                                <div className="text-6xl mb-6">🏆</div>
                                <h2 className="text-2xl font-black mb-4">הבט במסך המרכזי!</h2>
                                <p className="text-lg">המיקום שלך כרגע: <strong className="text-yellow-400 text-3xl block mt-2">#{myRank}</strong></p>
                            </div>
                        </div>
                    );
                }
                return null;
            }

            // ==========================================
            // ADMIN VIEW
            // ==========================================
            if (adminTab === 'game') {
                return (
                    <div className="fixed inset-0 z-50 bg-gradient-to-br from-slate-900 via-blue-950 to-indigo-950 flex flex-col items-center overflow-hidden pb-24">
                        <div className="w-full h-full max-w-6xl px-4 md:px-8 flex flex-col justify-between relative pt-4 pb-6 mx-auto">
                            {gameState.step === 'lobby' && (
                                <div className="text-center h-full flex flex-col items-center justify-center">
                                    <IconMetro />
                                    <h1 className="text-4xl md:text-6xl font-black mb-6 leading-tight">ברוכים הבאים לחידון הפתיחה של קורס הנדסת תנועה ותחבורה</h1>
                                    <div className="text-2xl font-bold text-blue-300 mb-10 bg-blue-900/30 px-8 py-3 rounded-full">ממתינים לשחקנים... ({players.length})</div>
                                    <div className="flex flex-wrap gap-3 justify-center">
                                        {players.map(p => <span key={p.id} className="bg-slate-800/80 px-5 py-2 rounded-full font-black border-2 border-slate-600">{p.name}</span>)}
                                    </div>
                                </div>
                            )}

                            {gameState.step === 'question' && currentQ && (
                                <div className="flex flex-col h-full w-full justify-center flex-1">
                                    <div className="flex justify-between items-center mb-4 shrink-0">
                                        <span className="text-blue-400 font-black text-xl md:text-2xl bg-blue-900/30 px-5 py-2 rounded-2xl">שאלה {gameState.questionIndex + 1}</span>
                                        <Timer timeLeft={timeLeft} />
                                        <span className="text-slate-400 font-bold text-lg md:text-xl bg-slate-800/50 px-5 py-2 rounded-2xl">ענו: <strong className="text-white">{currentAnswers.length} / {players.length}</strong></span>
                                    </div>
                                    <h2 className="text-3xl md:text-4xl lg:text-5xl font-black mb-6 leading-tight text-center">{currentQ.question}</h2>
                                    <div className="grid grid-cols-2 gap-4 w-full">
                                        {currentQ.options && currentQ.options.map((opt) => (
                                            <div key={opt.id} className="bg-slate-800/60 p-4 md:p-6 rounded-2xl border-2 border-slate-600 text-lg md:text-xl lg:text-2xl font-bold text-center flex items-center justify-center min-h-[90px]">
                                                {opt.text}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {gameState.step === 'results' && currentQ && (
                                <div className="flex flex-col w-full h-full animate-slide justify-between">
                                    <h2 className="text-2xl md:text-3xl font-black mb-2 text-center text-blue-300 uppercase tracking-widest">תוצאות השאלה</h2>
                                    <div className="space-y-2 md:space-y-3 flex-1 flex flex-col justify-center max-w-5xl mx-auto w-full">
                                        {currentQ.options && currentQ.options.map(opt => {
                                            const count = currentAnswers.filter(a => a.answerId === opt.id).length;
                                            const pct = currentAnswers.length ? Math.round((count / currentAnswers.length) * 100) : 0;
                                            return (
                                                <div key={opt.id} className="w-full grid grid-cols-[48px_1fr_48px] items-center gap-4">
                                                    <div className="w-12 h-12 shrink-0 flex items-center justify-center">
                                                        {opt.correct && (
                                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" className="w-12 h-12 text-green-400 animate-pop">
                                                                <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                                            </svg>
                                                        )}
                                                    </div>
                                                    <div className={`flex-1 relative overflow-hidden rounded-xl md:rounded-2xl border-2 p-2.5 md:p-3.5 flex justify-between items-center z-10 ${opt.correct ? 'border-green-500 bg-green-900/40' : 'border-slate-700 bg-slate-800/60'}`}>
                                                        <div className="absolute top-0 right-0 h-full bg-gradient-to-l from-blue-600/30 to-indigo-600/30 -z-10" style={{ width: `${pct}%` }}></div>
                                                        <span className="font-black text-base md:text-lg lg:text-xl pl-4">{opt.text}</span>
                                                        <span className="font-black text-xl md:text-2xl text-white">{count} ({pct}%)</span>
                                                    </div>
                                                    <div className="w-12 h-12 shrink-0"></div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="mt-3 shrink-0 bg-gradient-to-r from-blue-600/90 to-indigo-600/90 p-4 md:p-5 rounded-3xl border-2 border-blue-400 flex flex-col md:flex-row items-center justify-between gap-6 w-full max-w-5xl mx-auto">
                                        <div className="flex-1 text-right">
                                            <p className="text-blue-100 font-bold text-xs mb-1 uppercase">לסיכום:</p>
                                            <p className="text-xl md:text-2xl lg:text-3xl font-black text-white leading-tight">{currentQ.summary}</p>
                                        </div>
                                        {currentQ.image && (
                                            <img src={currentQ.image} alt="Traffic Illustration" className="w-1/4 max-w-[260px] h-24 md:h-32 object-cover rounded-xl border border-white/20 shadow-2xl animate-pop shrink-0" />
                                        )}
                                    </div>
                                </div>
                            )}

                            {gameState.step === 'leaderboard' && (
                                <div className="flex flex-col items-center justify-center h-full w-full">
                                    <h2 className="text-5xl font-black mb-10 text-yellow-400">🏆 המובילים 🏆</h2>
                                    <div className="w-full max-w-2xl space-y-4">
                                        {leaderboard.map((p, i) => (
                                            <div key={p.id} className={`flex justify-between items-center p-4 rounded-2xl font-black text-2xl ${i === 0 ? 'border-2 border-yellow-400 text-yellow-300' : 'bg-slate-800/80'}`}>
                                                <span>{i+1}. {p.name}</span>
                                                <span>{p.score} נק'</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-full flex items-center gap-4 whitespace-nowrap">
                            {gameState.step === 'lobby' && <button onClick={() => updateGameState({ step: 'question', questionIndex: 0 })} className="bg-green-500 px-6 py-2 rounded-full font-black">🚀 התחל משחק</button>}
                            {gameState.step === 'question' && <button onClick={() => updateGameState({ step: 'results' })} className="bg-blue-600 px-6 py-2 rounded-full font-black">📊 חשוף תוצאות</button>}
                            {gameState.step === 'results' && <button onClick={() => updateGameState({ step: 'leaderboard' })} className="bg-yellow-600 px-6 py-2 rounded-full font-black">🏆 טבלת מובילים</button>}
                            {gameState.step === 'leaderboard' && (gameState.questionIndex < dynamicQuestions.length - 1 ? <button onClick={() => updateGameState({ step: 'question', questionIndex: gameState.questionIndex + 1 })} className="bg-blue-600 px-6 py-2 rounded-full font-black">➔ לשאלה הבאה</button> : <span className="text-green-400 font-black px-4">סיום המשחק! 🎉</span>)}
                            <div className="h-6 w-px bg-slate-700"></div>
                            <button onClick={() => setAdminTab('questions')} className="text-slate-300 hover:text-white font-bold bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-full text-sm">⚙️ עריכת שאלות</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center p-4 w-full overflow-y-auto">
                    <nav className="w-full max-w-5xl flex justify-between items-center glass-panel p-4 rounded-2xl mb-6">
                        <div className="font-black text-xl text-blue-300">⚙️ פאנל ניהול</div>
                        <div className="flex gap-2">
                            <button onClick={() => setAdminTab('game')} className="px-4 py-2 rounded-xl bg-blue-600 font-bold">חזור למשחק ➔</button>
                        </div>
                    </nav>
                    <main className="w-full max-w-5xl pb-10">
                        <div className="flex justify-between items-center mb-6 bg-slate-800/50 p-5 rounded-3xl">
                            <div className="flex gap-3">
                                <button onClick={saveAllQuestions} className="bg-blue-600 px-5 py-2.5 rounded-xl font-black">💾 שמור שינויים</button>
                                <button onClick={addQuestion} className="bg-green-600 px-5 py-2.5 rounded-xl font-black">➕ הוסף שאלה</button>
                                <button onClick={resetGame} className="bg-red-900 px-5 py-2.5 rounded-xl font-bold">🗑️ איפוס</button>
                            </div>
                        </div>
                        <div className="space-y-6">
                            {dynamicQuestions.map((q, qIdx) => (
                                <div key={q.id} className="glass-panel p-6 rounded-[2.5rem] relative">
                                    <button onClick={() => deleteQuestion(q.id)} className="absolute top-4 left-4 text-red-400">מחק 🗑️</button>
                                    <div className="mb-5 mt-4">
                                        <label className="block text-xs font-black text-blue-400 mb-2">שאלה {qIdx + 1}</label>
                                        <input type="text" className="w-full p-4 bg-slate-900 border-2 border-slate-700 rounded-2xl text-white font-black" value={q.question} onChange={e => updateQuestionData(qIdx, 'question', e.target.value)} />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
                                        {q.options && q.options.map((opt, oIdx) => (
                                            <div key={opt.id} className={`flex items-center gap-3 p-3 rounded-2xl border-2 ${opt.correct ? 'border-green-500 bg-green-900/20' : 'border-slate-700 bg-slate-800'}`}>
                                                <input type="radio" checked={opt.correct} onChange={() => setCorrectOption(qIdx, oIdx)} />
                                                <input type="text" className="flex-1 bg-transparent border-none outline-none text-white font-bold" value={opt.text} onChange={e => updateOptionText(qIdx, oIdx, e.target.value)} />
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-black text-indigo-400 mb-2">לסיכום:</label>
                                        <input type="text" className="w-full p-4 bg-slate-900 border border-slate-700 rounded-2xl text-white font-bold" value={q.summary} onChange={e => updateQuestionData(qIdx, 'summary', e.target.value)} />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
